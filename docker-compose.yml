services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secretpass
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - guess-network

  backend1: &backend-common
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: guess-game-backend:1.0
    restart: always
    depends_on:
      - postgres
    environment:
      FLASK_DB_TYPE: postgres
      FLASK_DB_USER: postgres
      FLASK_DB_PASSWORD: secretpass
      FLASK_DB_NAME: postgres
      FLASK_DB_HOST: postgres
      FLASK_DB_PORT: '5432'
      FLASK_APP: run.py
    expose:
      - '5000'
    networks:
      - guess-network

  backend2:
    <<: *backend-common

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: guess-game-nginx:1.0
    restart: always
    depends_on:
      - backend1
      - backend2
    ports:
      - '8080:80'
    networks:
      - guess-network

volumes:
  postgres_data:

networks:
  guess-network:
    driver: bridge
